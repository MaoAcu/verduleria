<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Frutas de Altura</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Loginstyle.css') }}"> 
    <link rel="stylesheet" href="{{ url_for('static', filename='css/popupstyle.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="http://logiclookcr.com/LogoDCC.webp" alt="Frutas de Altura" class="main-logo">
        </div>
        
        <header>
            <h1>¡Bienvenido!</h1>
            
        </header>

        <div id="flash-container">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <form method="post" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label" for="usuario">Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope icon-input"></i>
                    <input type="email" class="form-input" name="usuario" id="usuario" placeholder="correo@ejemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon-input"></i>
                    <input type="password" class="form-input" name="password" id="password" placeholder="••••••••" required>
                    <i id="togglePassword" class="fa-solid fa-eye eye-icon"></i>
                </div>
            </div>

            <div class="forgot-password">
                <a href="{{ url_for('routes.recuperar_Contra') }}">¿Problemas para entrar? Recuperar cuenta</a>
            </div>

            <button type="submit" class="login-btn">
                <span>Entrar al Mercado</span>
                <i class="fa-solid fa-basket-shopping"></i>
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/LoginScript.js') }}"></script>
    <script src="{{ url_for('static', filename='js/popup.js') }}"></script>
</body>
</html>
